name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Vet, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: templ generate

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: docker build -t imvinhnguyen:ci .

      - name: Boot container and smoke test
        run: |
          docker run -d --name imvinhnguyen -p 8080:8080 imvinhnguyen:ci
          sleep 5
          curl -fsS http://localhost:8080/ > /dev/null
          curl -fsS -D - -o /dev/null -H "X-Forwarded-Proto: https" http://localhost:8080/ | grep -i "strict-transport-security"
          docker rm -f imvinhnguyen
